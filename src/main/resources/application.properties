spring.application.name=MineGuard Platform
spring.profiles.active=prod

server.port=${PORT:8080}

# JPA / Hibernate shared defaults
spring.jpa.hibernate.naming.physical-strategy=com.mineguard.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# OpenAPI / Swagger documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Security / JWT
authorization.jwt.secret=MiClaveSuperSecretaYMuyLargaParaElProyectoMineGuard123456!
authorization.jwt.expiration.days=7

# Smart-band IoT edge device default credentials
edge.device.default.device-id=${EDGE_DEFAULT_DEVICE_ID:smart-band-001}
edge.device.default.api-key=${EDGE_DEFAULT_API_KEY:test-api-key-123}